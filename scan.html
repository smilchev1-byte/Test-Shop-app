<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Сканиране">
<meta name="theme-color" content="#18181a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>Сканиране</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.js"></script>
<script src="db.js"></script>
<style>
  /* ── Scan-specific overrides ── */
  body { min-height: 100dvh; display: flex; flex-direction: column; }

  .scan-header {
    background: var(--text-1);
    color: #fff;
    padding: max(14px, env(safe-area-inset-top)) 16px 0;
    display: flex;
    flex-direction: column;
    position: sticky; top: 0; z-index: 20;
    flex-shrink: 0;
  }
  .scan-header-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding-bottom: 14px;
  }
  .scan-header h1 {
    font-size: 17px; font-weight: 700; margin: 0;
    color: #fff; letter-spacing: -.02em;
  }
  .scan-counts {
    display: flex; gap: 20px; margin-left: auto;
    font-size: 11.5px; color: rgba(255,255,255,.6);
  }
  .scan-counts b { display: block; font-size: 20px; font-weight: 800; color: #fff; line-height: 1.1; letter-spacing: -.03em; }

  .scan-icon-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(255,255,255,.12);
    border: none; color: rgba(255,255,255,.8);
    cursor: pointer; font-size: 17px;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s;
    flex-shrink: 0;
  }
  .scan-icon-btn:hover { background: rgba(255,255,255,.22); }

  /* Mode bar */
  .mode-bar {
    display: flex;
    background: rgba(255,255,255,.08);
    border-radius: 12px 12px 0 0;
    overflow: hidden;
    margin: 0 0 -1px;
  }
  .mode-bar button {
    flex: 1; border: none; background: transparent;
    padding: 12px 0; font-size: 15px; font-weight: 700;
    color: rgba(255,255,255,.5); cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: color .15s, border-color .15s;
    font-family: inherit;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .mode-bar button.active[data-mode=in]  { color: #fff; border-color: #4ade80; }
  .mode-bar button.active[data-mode=out] { color: #fff; border-color: #fb923c; }

  /* Main area */
  .scan-main {
    flex: 1; overflow-y: auto;
    padding: 16px 14px max(24px, calc(env(safe-area-inset-bottom) + 88px));
    max-width: 520px; width: 100%; margin: 0 auto;
  }

  /* Camera card */
  .camera-card {
    background: var(--text-1);
    border-radius: var(--r-lg);
    overflow: hidden;
    margin-bottom: 14px;
    box-shadow: var(--shadow-3);
  }
  .camera-card #reader {
    max-width: 100%; margin: 0; border-radius: 0;
    box-shadow: none;
  }
  .camera-btns {
    display: flex; gap: 10px; padding: 12px;
    background: rgba(255,255,255,.04);
  }
  .camera-btns .btn { flex: 1; border-radius: var(--r-sm); padding: 12px; font-size: 15px; justify-content: center; }
  .camera-btns .btn.start-btn { background: var(--in); }
  .camera-btns .btn.start-btn:hover { background: var(--green-500); }
  .camera-btns .btn.stop-btn  { background: rgba(255,255,255,.1); color: #fff; border-color: rgba(255,255,255,.15); }

  /* Flash */
  .flash {
    border-radius: var(--r-sm);
    margin-bottom: 14px;
    border-left-width: 4px;
  }

  /* Pending list */
  .pending-header {
    display: flex; align-items: center; justify-content: space-between;
    margin: 4px 0 8px;
  }
  .pending-header h2 { font-size: 15px; margin: 0; font-weight: 700; }
  .pending-header .count-badge {
    background: var(--accent); color: #fff;
    font-size: 12px; font-weight: 700;
    padding: 2px 9px; border-radius: 100px;
    min-width: 26px; text-align: center;
  }

  .pendrow { border-radius: var(--r-sm); }
  .pendrow:hover { background: var(--surface-2); border-radius: var(--r-sm); }

  /* Connect panel */
  .connect-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    padding: 20px;
    margin-bottom: 14px;
    box-shadow: var(--shadow-1);
  }

  /* Bottom action bar */
  .action-bar {
    position: fixed; left: 0; right: 0; bottom: 0;
    padding: 10px 14px max(14px, env(safe-area-inset-bottom));
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex; gap: 10px;
    max-width: 520px; margin: 0 auto;
    box-shadow: 0 -4px 20px rgba(0,0,0,.08);
    z-index: 10;
  }
  .action-bar .btn { flex: 1; padding: 14px; font-size: 15px; font-weight: 700; border-radius: var(--r-sm); justify-content: center; }
  .action-bar .commit-btn.in  { background: var(--in); }
  .action-bar .commit-btn.out { background: var(--out); }
</style>
</head>
<body>

<header class="scan-header">
  <div class="scan-header-row">
    <button class="scan-icon-btn" onclick="window.location='index.html'" title="Главно меню">←</button>
    <h1>Сканиране</h1>
    <div class="scan-counts" id="counts"></div>
    <button class="scan-icon-btn" id="theme-btn" title="Смени тема">🌙</button>
    <button class="scan-icon-btn" id="settings-btn" title="Настройки">⚙</button>
  </div>
  <div class="mode-bar" id="mode">
    <button data-mode="in" class="active">↓ Входиране</button>
    <button data-mode="out">↑ Изваждане</button>
  </div>
</header>

<div class="scan-main">

  <!-- Connect -->
  <div class="connect-wrap hide" id="connect-panel">
    <h2 style="margin:0 0 6px;font-size:16px">Свърза с базата</h2>
    <p class="hint">Ако вече сте свързвали приложението в този браузър, данните се зареждат автоматично.</p>
    <div style="margin-bottom:10px"><label>Project URL</label><input id="db-url" placeholder="https://xxxx.supabase.co"></div>
    <div style="margin-bottom:14px"><label>Anon key</label><input id="db-key" placeholder="eyJhbGciOi..."></div>
    <button class="btn xl" style="width:100%;justify-content:center" id="db-connect">Свържи</button>
  </div>

  <!-- Camera -->
  <div id="scan-ui" class="hide">
    <div class="camera-card">
      <div id="reader"></div>
      <div class="camera-btns">
        <button class="btn start-btn" id="start">▶ Стартирай камерата</button>
        <button class="btn stop-btn ghost" id="stop" disabled>■ Спри</button>
      </div>
    </div>

    <div class="flash hide" id="flash"></div>

    <div class="pending-header">
      <h2>За потвърждаване</h2>
      <span class="count-badge" id="cnt">0</span>
    </div>
    <div id="list"><div class="empty">Все още нищо сканирано.</div></div>
  </div>

</div>

<div class="action-bar hide" id="action-bar">
  <button class="btn ghost" id="clear" disabled>Изчисти</button>
  <button class="btn commit-btn in" id="commit" disabled>Входирай (0)</button>
</div>

<div class="status" id="status"></div>

<script src="scan.js"></script>
</body>
</html>
