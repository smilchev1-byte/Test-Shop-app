<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Сканиране">
<meta name="theme-color" content="#1c1c1a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>Сканиране</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.js"></script>
<script src="db.js"></script>
<style>
  /* scan-specific overrides for full-screen mobile feel */
  body { background: var(--bg); }
  header {
    padding: max(12px, env(safe-area-inset-top)) 16px 12px;
    position: sticky; top: 0; z-index: 20;
  }
  header .counts { margin-left: auto; display: flex; gap: 16px; font-size: 12px; text-align: right; }
  header .counts b { display: block; font-size: 17px; font-weight: 800; }
  main { padding: 14px; max-width: 520px; margin: 0 auto; padding-bottom: 100px; }
  .seg button { padding: 15px 0; font-size: 17px; font-weight: 700; }
  #reader { width: 100%; border-radius: var(--radius); overflow: hidden; background: #000; min-height: 60px; }
  .btn-full { width: 100%; padding: 16px; font-size: 17px; font-weight: 700; border-radius: var(--radius); }
  .stack { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }
  .pendrow { padding: 13px 0; }
  .pendrow .meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .pendrow .m { font-weight: 600; }
  .bar-bottom {
    position: fixed; left: 0; right: 0; bottom: 0;
    background: var(--panel);
    border-top: 1px solid var(--line);
    padding: 12px 14px max(12px, env(safe-area-inset-bottom));
    display: flex; gap: 10px;
    max-width: 520px; margin: 0 auto;
    box-shadow: 0 -2px 10px rgba(0,0,0,.07);
  }
  .bar-bottom .btn { flex: 1; padding: 15px; font-size: 16px; font-weight: 700; justify-content: center; }
  .connect-panel { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); padding: 18px; margin-bottom: 14px; }
</style>
</head>
<body>

<header>
  <h1>Сканиране</h1>
  <div class="counts" id="counts"></div>
  <button class="theme-btn" id="theme-btn" title="Смени тема">🌙</button>
</header>

<main>
  <!-- connect panel -->
  <div class="connect-panel hide" id="connect-panel">
    <div class="note warn" style="margin-bottom:12px">
      Ако вече сте свързвали приложението в този браузър, данните се зареждат автоматично.
    </div>
    <div style="margin-bottom:10px"><label>Project URL</label><input id="db-url" placeholder="https://xxxx.supabase.co"></div>
    <div style="margin-bottom:12px"><label>anon / publishable key</label><input id="db-key" placeholder="eyJhbGciOi..."></div>
    <button class="btn btn-full" id="db-connect">Свържи</button>
  </div>

  <!-- scan UI -->
  <div id="scan-ui" class="hide">
    <div class="seg" id="mode" style="width:100%;margin-bottom:14px">
      <button data-mode="in" class="active">Входиране</button>
      <button data-mode="out">Изваждане</button>
    </div>
    <div id="reader"></div>
    <div class="stack">
      <button class="btn btn-full in" id="start">Старт на камерата</button>
      <button class="btn btn-full ghost" id="stop" disabled>Спри камерата</button>
    </div>
    <div class="flash" id="flash"></div>
    <div class="hint" style="margin-top:16px">За потвърждаване (<span id="cnt">0</span>)</div>
    <div id="list"><div class="empty">Все още нищо сканирано.</div></div>
  </div>
</main>

<div class="bar-bottom hide" id="bar-bottom">
  <button class="btn ghost" id="clear" disabled>Изчисти</button>
  <button class="btn in"    id="commit" disabled>Входирай (0)</button>
</div>

<div class="status" id="status"></div>

<script src="scan.js"></script>
</body>
</html>
